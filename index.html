<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tim Rekelj</title>
    <style>
      body {
        background-color: #000;
        color: #fff;
        font-family: "Helvetica", sans-serif;
        margin: 30px;
        position: relative;
        overflow: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: transparent url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300"><filter id="noise" x="0" y="0" width="100%" height="100%"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)"/></svg>');
        opacity: 0.1;
        pointer-events: none;
        z-index: -1;
        animation: noise 2s steps(5) infinite;
      }
      @keyframes noise {
        to { transform: translate3d(5%, -10%, 0); }
      }
      .links {
        display: flex;
        gap: 20px;
      }
      .links a {
        color: #fff;
        text-decoration: none;
        padding: 8px 16px;
        border: 1px solid #333;
        border-radius: 4px;
        transition: all 0.2s ease;
      }
      .links a:hover {
        border-color: #666;
        background-color: #111;
      }
      .calda {
        color: #ff3d00;
        font-weight: bold;
        text-decoration: none;
      }
      .calvin {
        position: fixed;
        bottom: 0px;
        right: 0px;
        max-width: 100%;
        height: 1080px;
        opacity: 0.8;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <h1>Tim Rekelj</h1>
    <p>
      I'm a 24 year old developer from Slovenia currently working at
      <a class="calda" href="https://www.thecalda.com/">The Calda</a>.
    </p>
    <div class="links">
      <a href="https://github.com/timrekelj" target="_blank">GitHub</a>
      <a href="https://www.linkedin.com/in/tim-rekelj-28b2a9232" target="_blank">LinkedIn</a>
    </div>
    <img src="calvin.png" class="calvin" alt="Calvin" />
  </body>
</html>
